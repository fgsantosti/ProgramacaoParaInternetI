<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário com GET</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
<div class="container">
    <h2>📋 Cadastro de Aluno</h2>

    <!-- action aponta para o arquivo PHP que vai processar -->
    <!-- method GET envia os dados pela URL -->
    <form action="processa_get.php" method="GET">

        <div class="form-group">
            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome">
        </div>

        <div class="form-group">
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade" min="1">
        </div>

        <div class="form-group">
            <label for="curso">Curso:</label>
            <select id="curso" name="curso">
                <option value="">-- Selecione --</option>
                <option value="ADS">Análise e Desenvolvimento de Sistemas</option>
                <option value="RDS">Redes de Computadores</option>
                <option value="GEO">Geoprocessamento</option>
            </select>
        </div>

        <button type="submit">Enviar</button>
    </form>
</div>
</body>
</html>
